openapi: 3.0.0
info:
  title: YOVI API
  version: 1.0.12
  description: >
    API del sistema YOVI para gestión de usuarios, partidas y acceso externo de bots.
    Incluye el endpoint `/play` que permite a bots externos jugar contra el sistema
    enviando el estado del tablero en notación YEN.

servers:
  - url: https://yovies4a.duckdns.org
    description: Servidor de producción (Gateway)
  - url: http://localhost:8001
    description: Servidor de desarrollo (Users service directo)
  - url: http://localhost:4000
    description: Servidor de desarrollo (Gamey service directo)

paths:

  # ──────────────────────────────────────────────────────────────
  # AUTH & REGISTRO
  # ──────────────────────────────────────────────────────────────

  /api/users/createuser:
    post:
      summary: Registrar un nuevo usuario
      description: Crea un nuevo usuario con username, contraseña y email. Envía un correo de verificación.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - email
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 20
                  pattern: '^[a-zA-Z0-9._-]+$'
                  example: "testuser"
                password:
                  type: string
                  example: "secret123"
                email:
                  type: string
                  format: email
                  example: "testuser@example.com"
                profilePicture:
                  type: string
                  example: "seniora.png"
      responses:
        '201':
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "¡Bienvenido testuser! Por favor, revisa tu correo para verificar tu cuenta."
        '400':
          description: Error de validación o usuario/email duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/login:
    post:
      summary: Iniciar sesión
      description: Autentica a un usuario registrado y verificado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "testuser"
                password:
                  type: string
                  example: "secret123"
      responses:
        '200':
          description: Login correcto
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Bienvenido testuser"
                  username:
                    type: string
                    example: "testuser"
                  profilePicture:
                    type: string
                    example: "seniora.png"
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Email no verificado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/verify:
    get:
      summary: Verificar correo electrónico
      description: Verifica la cuenta de un usuario mediante el token enviado por email.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Token de verificación recibido por email
      responses:
        '200':
          description: Email verificado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Token inválido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # GESTIÓN DE PERFIL
  # ──────────────────────────────────────────────────────────────

  /api/users/users/{username}/profile:
    get:
      summary: Obtener perfil de usuario
      description: Devuelve la información básica y el avatar de un usuario (sin contraseñas).
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Perfil devuelto correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    example: "testuser"
                  email:
                    type: string
                    example: "testuser@example.com"
                  profilePicture:
                    type: string
                    example: "seniora.png"
        '400':
          description: Username inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/users/{username}/password:
    put:
      summary: Cambiar contraseña
      description: Actualiza la contraseña validando la contraseña actual.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
              properties:
                oldPassword:
                  type: string
                  example: "secret123"
                newPassword:
                  type: string
                  example: "newSecret123!"
      responses:
        '200':
          description: Contraseña actualizada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Datos de la petición inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Contraseña actual incorrecta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/users/{username}/username:
    patch:
      summary: Cambiar nombre de usuario
      description: Permite a un usuario cambiar su nombre de usuario de forma única en el sistema.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newUsername
              properties:
                newUsername:
                  type: string
                  example: "newtestuser"
      responses:
        '200':
          description: Username actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  username:
                    type: string
        '400':
          description: Nombre inválido o ya en uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/users/{username}/avatar:
    patch:
      summary: Cambiar avatar de perfil
      description: Permite seleccionar un nuevo avatar de la lista predefinida.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - profilePicture
              properties:
                profilePicture:
                  type: string
                  enum: ['seniora.png', 'disco.png', 'rubia.png', 'elvis.png']
                  example: "disco.png"
      responses:
        '200':
          description: Avatar actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  profilePicture:
                    type: string
        '400':
          description: Avatar inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # PARTIDAS Y ESTADÍSTICAS DE USUARIO
  # ──────────────────────────────────────────────────────────────

  /api/users/users/{username}/games:
    post:
      summary: Registrar una partida y actualizar estadísticas
      description: >
        Registra una partida terminada para el usuario indicado y actualiza
        sus estadísticas acumuladas (gamesPlayed, gamesWon, gamesLost, etc.).
        Si la partida ya fue registrada (mismo gameId), devuelve 409.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: Nombre de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - gameId
                - mode
                - result
                - boardSize
                - totalMoves
              properties:
                gameId:
                  type: string
                  maxLength: 100
                  description: Identificador único de la partida
                  example: "abc-123"
                mode:
                  type: string
                  enum: [classic_hvb, classic_hvh, tabu_hvh, holey_hvh, fortune_dice_hvh, poly_hvh, pastel_hvh, master_hvh, fortune_coin_hvh, why_not_hvh, 3dy_hvh, hex_hvh]
                  description: Modo de juego (variantes disponibles)
                  example: "classic_hvb"
                result:
                  type: string
                  enum: [won, lost, abandoned, draw]
                  description: Resultado de la partida para este usuario
                  example: "won"
                opponent:
                  type: string
                  description: Nombre del oponente (bot o usuario)
                  example: "random"
                startedBy:
                  type: string
                  description: Quién inició la partida
                  example: "human"
                boardSize:
                  type: integer
                  minimum: 1
                  description: Tamaño del tablero utilizado
                  example: 5
                totalMoves:
                  type: integer
                  minimum: 0
                  description: Número total de movimientos realizados
                  example: 12
      responses:
        '201':
          description: Partida registrada y estadísticas actualizadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                  stats:
                    $ref: '#/components/schemas/GameStats'
                  savedGame:
                    $ref: '#/components/schemas/GameRecord'
        '400':
          description: Cuerpo de la petición inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: La partida ya fue registrada para este usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/users/{username}/history:
    get:
      summary: Historial de partidas paginado
      description: >
        Devuelve el historial de partidas del usuario con paginación y la posibilidad de filtrar
        por modo de juego o resultado, así como de ordenarlos.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Número de página (empieza en 1)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
          description: Número de partidas por página (máximo 50)
        - name: mode
          in: query
          required: false
          schema:
            type: string
          description: Filtrar por variante (ej. classic_hvb)
        - name: result
          in: query
          required: false
          schema:
            type: string
            enum: [won, lost, abandoned, draw]
          description: Filtrar partidas por resultado
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, movesDesc, movesAsc]
            default: newest
          description: Ordenación de resultados
      responses:
        '200':
          description: Historial devuelto correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                  profilePicture:
                    type: string
                  stats:
                    $ref: '#/components/schemas/GameStats'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      totalGames:
                        type: integer
                      totalPages:
                        type: integer
                  games:
                    type: array
                    items:
                      $ref: '#/components/schemas/GameRecord'
        '400':
          description: Username inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/users/{username}/stats:
    get:
      summary: Obtener estadísticas individuales de un usuario
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Estadísticas devueltas correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStats'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Actualizar estadísticas de usuario (endpoint legacy)
      description: >
        Actualiza las estadísticas del usuario tras una partida.
        Se recomienda usar POST /users/{username}/games para nuevas integraciones.
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - won
                - totalMoves
              properties:
                won:
                  type: boolean
                  description: Si el usuario ganó la partida
                totalMoves:
                  type: integer
                  minimum: 0
                  description: Movimientos realizados por el usuario
      responses:
        '200':
          description: Estadísticas actualizadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStats'
        '400':
          description: Cuerpo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # RANKING
  # ──────────────────────────────────────────────────────────────

  /api/users/ranking:
    get:
      summary: Obtener ranking de usuarios y podio semanal
      description: >
        Devuelve la lista paginada de usuarios ordenada por la métrica solicitada.
        Solo se incluyen usuarios que han jugado al menos una partida.
        Se incluye información separada del podio obtenida con estadísticas de los últimos 7 días.
      parameters:
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [winRate, gamesWon, gamesPlayed, gamesLost, gamesDrawn, gamesAbandoned, totalMoves]
            default: winRate
          description: Métrica de ordenación principal
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Índice de página
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Tamaño de la página (limitado a 100)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Alias de pageSize
      responses:
        '200':
          description: Ranking devuelto correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  sortBy:
                    type: string
                    example: winRate
                  podium:
                    type: object
                    description: Información en base a los últimos 7 días para destacar logros.
                    properties:
                      mostGames:
                        $ref: '#/components/schemas/PodiumEntry'
                      mostWins:
                        $ref: '#/components/schemas/PodiumEntry'
                      bestRate:
                        $ref: '#/components/schemas/PodiumEntry'
                  pagination:
                    type: object
                    properties:
                      totalItems:
                        type: integer
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      totalPages:
                        type: integer
                  ranking:
                    type: array
                    items:
                      $ref: '#/components/schemas/RankingEntry'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # API EXTERNA DE BOTS — endpoint "play"
  # ──────────────────────────────────────────────────────────────

  /play:
    get:
      summary: Obtener el siguiente movimiento del bot (API para bots externos)
      description: >
        Permite a un bot externo solicitar el siguiente movimiento dado un estado
        del tablero en notación YEN. El parámetro `position` contiene el estado
        completo del juego serializado como JSON en notación YEN.
        El parámetro opcional `bot_id` permite seleccionar la estrategia del bot.
        El parámetro opcional `api_version` permite especificar la versión del API
        (actualmente solo `v1` está soportada).

        **Ejemplo de uso**: un bot externo envía el estado actual de la partida
        y recibe la jugada que el sistema haría a continuación, también en YEN.
      parameters:
        - name: position
          in: query
          required: true
          description: >
            Estado del tablero en notación YEN, serializado como JSON y codificado
            en la URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YEN'
              example:
                size: 3
                turn: 0
                players: ["B", "R"]
                layout: "./../..."
        - name: bot_id
          in: query
          required: false
          schema:
            type: string
            enum: [random_bot, mcts_medio, mcts_dificil, mcts_demencial, mcts_completo_medio, mcts_completo_dificil]
            default: random_bot
          description: >
            Identificador del bot / estrategia a utilizar.
            Si se omite, se usa la estrategia por defecto (`random_bot`).
          example: "mcts_medio"
        - name: api_version
          in: query
          required: false
          schema:
            type: string
            enum: [v1]
            default: v1
          description: Versión del API. Actualmente solo `v1` está soportada.
      responses:
        '200':
          description: Movimiento calculado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResponse'
        '400':
          description: >
            Petición inválida. Posibles causas: falta el parámetro `position`,
            el JSON no es un YEN válido, o la versión de API no está soportada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayErrorResponse'
        '404':
          description: Bot no encontrado (bot_id desconocido)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayErrorResponse'
        '409':
          description: La partida ya ha terminado, no se puede calcular un movimiento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayErrorResponse'

  # ──────────────────────────────────────────────────────────────
  # ENDPOINTS DE JUEGO (GAMEY)
  # ──────────────────────────────────────────────────────────────

  /status:
    get:
      summary: Verificar estado del servidor de juego
      description: Devuelve "OK" si el servicio gamey está respondiendo.
      responses:
        '200':
          description: Servidor en funcionamiento
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /api/v1/meta:
    get:
      summary: Obtener metadatos del juego
      description: Devuelve los límites del tablero y la lista de bots disponibles.
      responses:
        '200':
          description: Metadatos devueltos
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                  min_board_size:
                    type: integer
                  max_board_size:
                    type: integer
                  bots:
                    type: array
                    items:
                      type: string

  /api/v1/config:
    get:
      summary: Obtener configuración guardada del usuario
      description: Devuelve la configuración de partida preferida (basada en X-Client-Id).
      responses:
        '200':
          description: Configuración devuelta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameConfig'
    put:
      summary: Actualizar configuración guardada
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameConfig'
      responses:
        '200':
          description: Configuración actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameConfig'

  /api/v1/hvh/games:
    post:
      summary: Crear una nueva partida Humano vs Humano
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                size:
                  type: integer
                hvh_starter:
                  type: string
                  enum: [player0, player1, random]
      responses:
        '200':
          description: Partida creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'

  /api/v1/hvb/games:
    post:
      summary: Crear una nueva partida Humano vs Bot
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                size:
                  type: integer
                hvb_starter:
                  type: string
                  enum: [human, bot, random]
                bot_id:
                  type: string
      responses:
        '200':
          description: Partida creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'

# ──────────────────────────────────────────────────────────────
# SCHEMAS
# ──────────────────────────────────────────────────────────────

components:
  schemas:

    YEN:
      type: object
      description: >
        Estado de una partida en notación YEN (Y Exchange Notation).
        Formato JSON inspirado en FEN del ajedrez.
      required:
        - size
        - layout
        - turn
        - players
      properties:
        size:
          type: integer
          description: Tamaño del tablero (número de casillas por lado)
          example: 3
        layout:
          type: string
          description: >
            Representación lineal del tablero con filas separadas por '/'.
            Cada carácter representa una casilla: '.' para vacía, o el símbolo
            del jugador correspondiente.
          example: "B/BR/.R."
        turn:
          type: integer
          description: Índice del jugador al que le toca mover (0 o 1)
          example: 0
        players:
          type: array
          items:
            type: string
            maxLength: 1
          description: Símbolos de los jugadores (ej. ['B', 'R'])
          example: ["B", "R"]

    Coordinates:
      type: object
      description: Coordenadas cúbicas de una casilla del tablero hexagonal
      required:
        - x
        - y
        - z
      properties:
        x:
          type: integer
          example: 1
        y:
          type: integer
          example: -2
        z:
          type: integer
          example: 1

    PlayResponse:
      oneOf:
        - type: object
          description: Respuesta con las coordenadas del movimiento calculado.
          required: [coords]
          properties:
            coords:
              $ref: '#/components/schemas/Coordinates'
        - type: object
          description: Respuesta con una acción especial (swap o resign).
          required: [action]
          properties:
            action:
              type: string
              enum: [swap, resign]

    PlayErrorResponse:
      type: object
      description: Respuesta de error del endpoint /play
      required: [message, code]
      properties:
        message:
          type: string
          description: Descripción legible del error
          example: "Missing required query parameter: position"
        code:
          type: string
          description: Código interno del error
          example: "missing_position"

    GameStats:
      type: object
      properties:
        gamesPlayed:
          type: integer
          description: Total de partidas jugadas
          example: 10
        gamesWon:
          type: integer
          description: Partidas ganadas
          example: 6
