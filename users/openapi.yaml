    GameRecord:
      type: object
      description: Registro de una partida en el historial de un usuario
      properties:
        gameId:
          type: string
          example: "abc-123"
        mode:
          type: string
          description: Modo de juego utilizado
          example: "classic_hvb"
        result:
          type: string
          enum: [won, lost, abandoned, draw]
          example: "won"
        opponent:
          type: string
          example: "greedy"
        startedBy:
          type: string
          example: "human"
        boardSize:
          type: integer
          example: 5
        totalMoves:
          type: integer
          example: 12
        finishedAt:
          type: string
          format: date-time
          example: "2025-03-15T18:30:00.000Z"

    RankingEntry:
      type: object
      properties:
        username:
          type: string
          example: "testuser"
        profilePicture:
          type: string
          example: "seniora.png"
        gamesPlayed:
          type: integer
          example: 10
        gamesWon:
          type: integer
          example: 6
        gamesLost:
          type: integer
          example: 3
        gamesDrawn:
          type: integer
          example: 0
        gamesAbandoned:
          type: integer
          example: 1
        totalMoves:
          type: integer
          description: Total de movimientos acumulados
          example: 84
        winRate:
          type: integer
          description: Porcentaje de partidas ganadas (0–100)
          example: 60

    GameConfig:
      type: object
      properties:
        size:
          type: integer
        hvb_starter:
          type: string
          enum: [human, bot, random]
        hvh_starter:
          type: string
          enum: [player0, player1, random]
          nullable: true
        bot_id:
          type: string
          nullable: true

    GameState:
      type: object
      properties:
        game_id:
          type: string
        mode:
          type: string
          enum: [hvh, hvb]
        yen:
          $ref: '#/components/schemas/YEN'
        status:
          type: object
          properties:
            state:
              type: string
              enum: [ongoing, finished]
            next:
              type: string
              nullable: true
            winner:
              type: string
              nullable: true

    ErrorResponse:
      type: object
      properties:
