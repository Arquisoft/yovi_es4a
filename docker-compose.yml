services:

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - monitor-net
    volumes:
      - mongo-data:/data/db
  gateway:
    build: ./gateway
    container_name: gateway
    image: ghcr.io/arquisoft/yovi_es4a-gateway:latest

    ports:
      - "80:80"    # Tráfico HTTP (Local/Redirección)
      - "443:443"  # Tráfico HTTPS (Azure)
    volumes:
      - ./gateway/certs:/etc/nginx/certs:ro # Para los certificados en Azure
    depends_on:
      - users
      - webapp
      - gamey
    networks:
      - monitor-net

