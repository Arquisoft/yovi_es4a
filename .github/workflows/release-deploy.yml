name: Release — Test, Build, Publish, Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  test-node:
    name: Run node unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [webapp, users]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run tests
        run: |
          cd ${{ matrix.service }}
          npm test

  test-rust:
    name: Run rust (gamey) tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: |
          cd gamey
          cargo test

  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    needs: [test-node, test-rust]

    # ── MongoDB como servicio de infraestructura ──────────────────────────────
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install users dependencies
        run: cd users && npm ci

      - name: Install webapp dependencies
        run: cd webapp && npm ci

      # ── Rust / gamey ──────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gamey/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gamey/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build gamey (release)
        run: cd gamey && cargo build --release

      # ── Arrancar servicios en background ──────────────────────────────────
      - name: Start gamey server
        run: |
          ./gamey/target/release/gamey --mode server --port 4000 &
        env:
          RUST_LOG: warn

      - name: Start users service
        run: |
          cd users && node users-service.js &
        env:
          MONGODB_URI: mongodb://localhost:27017/yovi
          PORT: 8001

      - name: Wait for services to be ready
        run: |
          echo "Esperando gamey en :4000..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:4000/status && echo " OK" && break
            echo "  intento $i/20 — reintentando en 3s"
            sleep 3
          done

          echo "Esperando users en :8001..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8001/api-docs > /dev/null 2>&1 && echo " OK" && break
            curl -sf http://localhost:8001/ > /dev/null 2>&1 && echo " OK" && break
            echo "  intento $i/20 — reintentando en 3s"
            sleep 3
          done

      # ── Playwright ────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: cd webapp && npm run test:e2e:install-browsers

      # ── E2E ───────────────────────────────────────────────────────────────
      # users y gamey ya corren en background; test:e2e solo lanza Vite
      - name: Run E2E tests
        run: cd webapp && npm run test:e2e
        env:
          VITE_API_PROXY_TARGET: http://localhost:8001
          VITE_GAME_PROXY_TARGET: http://localhost:4000

  docker-push-users:
    name: Publish users image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (users)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-users
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users

  docker-push-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (webapp)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-webapp
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: webapp
          buildargs: VITE_API_URL=/api/users

  docker-push-gamey:
    name: Publish gamey image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (gamey)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gamey
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: gamey
  docker-push-gateway:
      name: Publish gateway image
      runs-on: ubuntu-latest
      needs: e2e
      permissions:
        contents: read
        packages: write
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Publish to Registry (gateway)
          uses: elgohr/Publish-Docker-Github-Action@v5
          with:
            name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-gateway
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
            registry: ghcr.io
            workdir: gateway